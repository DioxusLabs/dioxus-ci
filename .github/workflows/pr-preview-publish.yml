name: Publish Dioxus PR Preview

on:
  workflow_call:
    inputs:
      preview-url-base:
        description: Site root used for comments. Defaults to `https://<owner>.github.io`.
        type: string
        default: ""
      base-path-prefix:
        description: Top-level base path under which previews are nested. Defaults to the caller's repository name.
        type: string
        default: ""
      branch:
        description: GitHub Pages branch to deploy to.
        type: string
        default: gh-pages
      runs-on:
        type: string
        default: ubuntu-latest

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  publish-preview:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    name: Publish PR Preview
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}/dioxus-pr-preview-download
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate preview artifact
        id: preview
        shell: bash
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/dioxus-pr-preview-download
          EXPECTED_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
          PREVIEW_URL_BASE: ${{ inputs.preview-url-base }}
          BASE_PATH_PREFIX: ${{ inputs.base-path-prefix }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import shutil
          import sys
          from pathlib import Path

          artifact_root = Path(os.environ["ARTIFACT_ROOT"])
          metadata_files = list(artifact_root.glob("**/.dioxus-ci-preview.json"))
          if len(metadata_files) != 1:
              print(f"Expected one preview metadata file, found {len(metadata_files)}", file=sys.stderr)
              sys.exit(1)

          metadata_path = metadata_files[0]
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          event_prs = json.loads(os.environ["WORKFLOW_RUN_PULL_REQUESTS"] or "[]")
          event_pr_numbers = {int(pr["number"]) for pr in event_prs if "number" in pr}
          if len(event_pr_numbers) != 1:
              print(f"Expected exactly one workflow_run PR, found {sorted(event_pr_numbers)}", file=sys.stderr)
              sys.exit(1)

          pr_number = next(iter(event_pr_numbers))
          artifact_pr_number = int(metadata.get("pr_number", 0))
          if artifact_pr_number != pr_number:
              print(f"Artifact PR #{artifact_pr_number} does not match workflow_run PR #{pr_number}", file=sys.stderr)
              sys.exit(1)
          if metadata.get("repository") != os.environ["EXPECTED_REPOSITORY"]:
              print("Artifact repository does not match this repository", file=sys.stderr)
              sys.exit(1)

          workflow_sha = os.environ["WORKFLOW_RUN_SHA"]
          allowed_shas = {metadata.get("head_sha"), metadata.get("merge_sha")}
          if workflow_sha not in allowed_shas:
              print("Artifact SHA does not match the triggering workflow_run", file=sys.stderr)
              sys.exit(1)

          site_dir = metadata_path.parent / "site"
          if not site_dir.is_dir():
              print(f"Preview site directory missing: {site_dir}", file=sys.stderr)
              sys.exit(1)

          stage_dir = Path(os.environ["GITHUB_WORKSPACE"]) / ".dioxus-ci-preview-site"
          if stage_dir.exists():
              shutil.rmtree(stage_dir)
          shutil.copytree(site_dir, stage_dir)

          target_folder = f"pr-preview/pr-{pr_number}/"
          metadata_base_path = str(metadata.get("base_path", "")).strip("/")
          if "://" in metadata_base_path or any(part == ".." for part in metadata_base_path.split("/")):
              print("Artifact base path is not a safe URL path", file=sys.stderr)
              sys.exit(1)
          base_path_prefix = os.environ["BASE_PATH_PREFIX"].strip().strip("/")
          if not base_path_prefix:
              base_path_prefix = os.environ["REPOSITORY_NAME"]
          expected_url_path = f"{base_path_prefix}/{target_folder.rstrip('/')}"
          if metadata_base_path and metadata_base_path != expected_url_path:
              print("Artifact base path does not match the trusted preview path", file=sys.stderr)
              sys.exit(1)

          preview_base = os.environ["PREVIEW_URL_BASE"].strip().rstrip("/")
          if preview_base:
              preview_url = f"{preview_base}/{expected_url_path}/"
          else:
              preview_url = f"https://{os.environ['REPOSITORY_OWNER']}.github.io/{expected_url_path}/"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"pr-number={pr_number}\n")
              output.write(f"stage-dir={stage_dir}\n")
              output.write(f"target-folder={target_folder}\n")
              output.write(f"preview-url={preview_url}\n")
          PY
      - name: Deploy preview
        uses: JamesIves/github-pages-deploy-action@b36f842fa378d7cbf6695fcac86ecdcef3af8af3 # v4.2.3
        with:
          token: ${{ github.token }}
          branch: ${{ inputs.branch }}
          folder: ${{ steps.preview.outputs.stage-dir }}
          target-folder: ${{ steps.preview.outputs.target-folder }}
          clean: false
          single-commit: true
      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3
        with:
          pr-number: ${{ steps.preview.outputs.pr-number }}
          message: |
            Preview available at ${{ steps.preview.outputs.preview-url }}
          comment-tag: pr-preview
