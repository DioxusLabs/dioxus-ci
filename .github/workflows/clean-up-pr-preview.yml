name: Clean Up PR Preview

on:
  workflow_call:

permissions:
  contents: write

jobs:
  cleanup-preview:
    name: Clean Up PR Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create empty directory
        run: echo "empty_dir=$(mktemp -d)" >> "$GITHUB_ENV"
      - name: Deploy empty preview
        uses: JamesIves/github-pages-deploy-action@b36f842fa378d7cbf6695fcac86ecdcef3af8af3 # v4.2.3
        with:
          token: ${{ github.token }}
          branch: gh-pages
          folder: ${{ env.empty_dir }}
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}/
          clean: true
          single-commit: true
