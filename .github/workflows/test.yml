name: Cargo Test

on:
  workflow_call:
    inputs:
      toolchain:
        type: string
        default: stable
      workspace:
        type: boolean
        default: true
      package:
        description: Newline-separated package names passed with `--package`.
        type: string
        default: ""
      exclude:
        description: Newline-separated package names passed with `--exclude`.
        type: string
        default: ""
      features:
        type: string
        default: ""
      all-features:
        type: boolean
        default: false
      no-default-features:
        type: boolean
        default: false
      target:
        type: string
        default: ""
      test-name:
        description: Optional cargo test filter.
        type: string
        default: ""
      lib:
        type: boolean
        default: false
      bins:
        type: boolean
        default: false
      examples:
        type: boolean
        default: false
      tests:
        type: boolean
        default: false
      benches:
        type: boolean
        default: false
      all-targets:
        type: boolean
        default: false
      doc:
        type: boolean
        default: false
      no-run:
        type: boolean
        default: false
      no-fail-fast:
        type: boolean
        default: false
      ignored:
        type: boolean
        default: false
      include-ignored:
        type: boolean
        default: false
      locked:
        type: boolean
        default: false
      frozen:
        type: boolean
        default: false
      offline:
        type: boolean
        default: false
      jobs:
        type: string
        default: ""
      apt-packages:
        type: string
        default: ""
      cache-directories:
        type: string
        default: ""
      setup-firefox:
        type: boolean
        default: false
      free-disk-space:
        type: boolean
        default: false
      runs-on:
        type: string
        default: ubuntu-24.04

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Test Suite
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - if: inputs.free-disk-space
        uses: ealmloff/dioxus-ci/actions/free-disk-space@main
      - uses: ealmloff/dioxus-ci/actions/setup-dioxus@main
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt, clippy
          apt-packages: ${{ inputs.apt-packages }}
          cache-directories: ${{ inputs.cache-directories }}
      - if: inputs.setup-firefox
        uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8 # v1.7.1
      - shell: bash
        env:
          WORKSPACE: ${{ inputs.workspace }}
          PACKAGE: ${{ inputs.package }}
          EXCLUDE: ${{ inputs.exclude }}
          FEATURES: ${{ inputs.features }}
          ALL_FEATURES: ${{ inputs.all-features }}
          NO_DEFAULT_FEATURES: ${{ inputs.no-default-features }}
          TARGET: ${{ inputs.target }}
          TEST_NAME: ${{ inputs.test-name }}
          LIB: ${{ inputs.lib }}
          BINS: ${{ inputs.bins }}
          EXAMPLES: ${{ inputs.examples }}
          TESTS: ${{ inputs.tests }}
          BENCHES: ${{ inputs.benches }}
          ALL_TARGETS: ${{ inputs.all-targets }}
          DOC: ${{ inputs.doc }}
          NO_RUN: ${{ inputs.no-run }}
          NO_FAIL_FAST: ${{ inputs.no-fail-fast }}
          IGNORED: ${{ inputs.ignored }}
          INCLUDE_IGNORED: ${{ inputs.include-ignored }}
          LOCKED: ${{ inputs.locked }}
          FROZEN: ${{ inputs.frozen }}
          OFFLINE: ${{ inputs.offline }}
          CARGO_JOBS: ${{ inputs.jobs }}
        run: |
          set -euo pipefail
          args=()
          test_args=()
          append_lines() {
            local flag="$1"
            local value="$2"
            while IFS= read -r item; do
              if [ -n "$item" ]; then args+=("$flag" "$item"); fi
            done <<< "$value"
          }
          if [ "$WORKSPACE" = "true" ]; then args+=(--workspace); fi
          append_lines --package "$PACKAGE"
          append_lines --exclude "$EXCLUDE"
          if [ -n "$FEATURES" ]; then args+=(--features "$FEATURES"); fi
          if [ "$ALL_FEATURES" = "true" ]; then args+=(--all-features); fi
          if [ "$NO_DEFAULT_FEATURES" = "true" ]; then args+=(--no-default-features); fi
          if [ -n "$TARGET" ]; then args+=(--target "$TARGET"); fi
          if [ "$LIB" = "true" ]; then args+=(--lib); fi
          if [ "$BINS" = "true" ]; then args+=(--bins); fi
          if [ "$EXAMPLES" = "true" ]; then args+=(--examples); fi
          if [ "$TESTS" = "true" ]; then args+=(--tests); fi
          if [ "$BENCHES" = "true" ]; then args+=(--benches); fi
          if [ "$ALL_TARGETS" = "true" ]; then args+=(--all-targets); fi
          if [ "$DOC" = "true" ]; then args+=(--doc); fi
          if [ "$NO_RUN" = "true" ]; then args+=(--no-run); fi
          if [ "$NO_FAIL_FAST" = "true" ]; then args+=(--no-fail-fast); fi
          if [ "$LOCKED" = "true" ]; then args+=(--locked); fi
          if [ "$FROZEN" = "true" ]; then args+=(--frozen); fi
          if [ "$OFFLINE" = "true" ]; then args+=(--offline); fi
          if [ -n "$CARGO_JOBS" ]; then args+=(--jobs "$CARGO_JOBS"); fi
          if [ -n "$TEST_NAME" ]; then args+=("$TEST_NAME"); fi
          if [ "$IGNORED" = "true" ]; then test_args+=(--ignored); fi
          if [ "$INCLUDE_IGNORED" = "true" ]; then test_args+=(--include-ignored); fi
          if [ "${#test_args[@]}" -gt 0 ]; then
            cargo test "${args[@]}" -- "${test_args[@]}"
          else
            cargo test "${args[@]}"
          fi
