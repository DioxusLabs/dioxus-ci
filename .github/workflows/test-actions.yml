name: Test Actions

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  architecture-guardrails:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: architecture guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.8 .github/workflows/*.yml
      - name: Verify pinned actions and safe inputs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          workflow_files = list((root / ".github" / "workflows").glob("*.yml"))
          action_files = list((root / "actions").glob("*/action.yaml"))
          checked_files = workflow_files + action_files
          failures = []
          uses_re = re.compile(r"\buses:\s*([^@\s#]+)@([^\s#]+)")
          sha_re = re.compile(r"^[0-9a-f]{40}$")

          for path in checked_files:
              for line_number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  match = uses_re.search(line)
                  if not match:
                      continue
                  action, ref = match.groups()
                  if action.startswith("./") or action.startswith("ealmloff/dioxus-ci/"):
                      continue
                  if not sha_re.fullmatch(ref):
                      failures.append(f"{path}:{line_number}: third-party action is not pinned to a commit SHA: {action}@{ref}")

          text_files = checked_files + [root / "README.md"]
          forbidden = {
              "pull_request" + "_target": "PR previews must not use the privileged PR target event",
              "extra" + "-args": "raw dx build argument hatches are not allowed",
              "$" + "{{ inputs" + ".args }}": "raw cargo args input is not allowed",
              "extra" + "=(" : "shell-splitting action inputs is not allowed",
          }
          for path in text_files:
              text = path.read_text(encoding="utf-8")
              for needle, message in forbidden.items():
                  if needle in text:
                      failures.append(f"{path}: {message} ({needle})")

          for path in checked_files:
              in_run_block = False
              run_indent = 0
              for line_number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  stripped = line.lstrip()
                  indent = len(line) - len(stripped)
                  if in_run_block and stripped and indent <= run_indent:
                      in_run_block = False
                  if re.match(r"^\s*run:\s*\|", line):
                      in_run_block = True
                      run_indent = indent
                      continue
                  if in_run_block and ("$" + "{{ inputs.") in line:
                      failures.append(
                          f"{path}:{line_number}: pass inputs through env before using them in shell scripts"
                      )

          workflow_setup_inputs = {
              "apt-packages:": "reusable workflows must not expose apt setup",
              "setup-firefox": "reusable workflows must not install browsers",
              "browser-actions/setup-firefox": "reusable workflows must not install browsers",
          }
          for path in workflow_files:
              if path.name == "test-actions.yml":
                  continue
              text = path.read_text(encoding="utf-8")
              for needle, message in workflow_setup_inputs.items():
                  if needle in text:
                      failures.append(f"{path}: {message} ({needle})")

          package_setup = {
              "cache-" + "apt-pkgs-action": "apt package setup must stay out of reusable CI actions",
          }
          for path in checked_files:
              text = path.read_text(encoding="utf-8")
              for needle, message in package_setup.items():
                  if needle in text:
                      failures.append(f"{path}: {message} ({needle})")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          PY

  setup-dioxus-linux:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: setup-dioxus on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/setup-dioxus
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - run: rustc --version && cargo --version

  setup-dioxus-mac-skip-apt:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: setup-dioxus on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/setup-dioxus
        with:
          targets: wasm32-unknown-unknown
      - run: rustc --version && cargo --version

  install-dioxus-cli:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: install-dioxus-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/install-dioxus-cli
      - run: dx --version

  free-disk-space:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: free-disk-space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/free-disk-space
      - run: df -h

  build-web-fixture:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: build-web against a fresh `dx new` fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/setup-dioxus
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache-directories: target/dx
      - uses: ./actions/install-dioxus-cli
      - name: Create fixture project
        run: |
          set -euo pipefail
          mkdir -p fixture/src
          cat > fixture/Cargo.toml <<'EOF'
          [package]
          name = "fixture"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          dioxus = { version = "0.7.0", features = ["web"] }
          EOF
          cat > fixture/src/main.rs <<'EOF'
          use dioxus::prelude::*;

          fn main() {
              dioxus::launch(App);
          }

          #[component]
          fn App() -> Element {
              rsx! { div { "fixture" } }
          }
          EOF
      - id: build
        uses: ./actions/build-web
        with:
          working-directory: fixture
          base-path: dioxus-ci-fixture
      - name: Verify output exists
        run: test -f "${{ steps.build.outputs.output-path }}/index.html"

  build-web-custom-target-dir:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: build-web with custom CARGO_TARGET_DIR
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/custom-target
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/setup-dioxus
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache: "false"
      - uses: ./actions/install-dioxus-cli
      - name: Create fixture project
        run: |
          set -euo pipefail
          mkdir -p fixture/src
          cat > fixture/Cargo.toml <<'EOF'
          [package]
          name = "fixture"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          dioxus = { version = "0.7.0", features = ["web"] }
          EOF
          cat > fixture/src/main.rs <<'EOF'
          use dioxus::prelude::*;

          fn main() {
              dioxus::launch(App);
          }

          #[component]
          fn App() -> Element {
              rsx! { div { "fixture" } }
          }
          EOF
      - id: build
        uses: ./actions/build-web
        with:
          working-directory: fixture
      - name: Verify output resolved from cargo metadata target directory
        run: |
          test -f "${{ steps.build.outputs.output-path }}/index.html"
          case "${{ steps.build.outputs.output-path }}" in
            "$CARGO_TARGET_DIR"/*) ;;
            *) echo "output path did not use CARGO_TARGET_DIR" >&2; exit 1 ;;
          esac

  build-web-explicit-output-dir:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: build-web with explicit output-dir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./actions/setup-dioxus
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache: "false"
      - uses: ./actions/install-dioxus-cli
      - name: Create fixture project
        run: |
          set -euo pipefail
          mkdir -p fixture/src
          cat > fixture/Cargo.toml <<'EOF'
          [package]
          name = "fixture"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          dioxus = { version = "0.7.0", features = ["web"] }
          EOF
          cat > fixture/src/main.rs <<'EOF'
          use dioxus::prelude::*;

          fn main() {
              dioxus::launch(App);
          }

          #[component]
          fn App() -> Element {
              rsx! { div { "fixture" } }
          }
          EOF
      - name: Build fixture manually
        working-directory: fixture
        run: dx build --web --release
      - id: build
        uses: ./actions/build-web
        with:
          working-directory: fixture
          output-dir: target/dx/fixture/release/web/public
      - name: Verify explicit output exists
        run: test -f "${{ steps.build.outputs.output-path }}/index.html"

  spa-404-fallback:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: spa-404-fallback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: mkdir -p out
      - uses: ./actions/spa-404-fallback
        with:
          output-dir: out
          base-path: my-app
          pr-preview-prefix: pr-preview
      - run: mkdir -p out-root
      - uses: ./actions/spa-404-fallback
        with:
          output-dir: out-root
          pr-preview-prefix: pr-preview
      - name: Verify 404.html
        run: |
          test -f out/404.html
          grep -q 'data-base-path="my-app"' out/404.html
          grep -q 'data-pr-preview-prefix="pr-preview"' out/404.html
          test -f out-root/404.html
          grep -q 'data-base-path=""' out-root/404.html
          grep -q 'data-pr-preview-prefix="pr-preview"' out-root/404.html
          node <<'NODE'
          const fs = require("fs");
          const assert = require("assert");

          function loadScript(path) {
            const html = fs.readFileSync(path, "utf8");
            const match = html.match(/<script\b[\s\S]*?>([\s\S]*?)<\/script>/);
            assert(match, `missing script in ${path}`);
            return match[1];
          }

          async function assertFetches(script, attributes, pathname, expected) {
            let fetched = "";
            global.window = { location: { pathname } };
            global.document = {
              currentScript: {
                getAttribute(name) {
                  return attributes[name] || "";
                },
              },
              documentElement: {},
              querySelectorAll() {
                return [];
              },
            };
            global.fetch = async (url) => {
              fetched = url;
              return { text: async () => "<html></html>" };
            };

            eval(script);
            await new Promise((resolve) => setImmediate(resolve));
            assert.strictEqual(fetched, expected, pathname);
          }

          (async () => {
            const basedScript = loadScript("out/404.html");
            await assertFetches(
              basedScript,
              { "data-base-path": "my-app", "data-pr-preview-prefix": "pr-preview" },
              "/my-app/pr-preview/pr-123/docs/guide/",
              "/my-app/pr-preview/pr-123/",
            );
            await assertFetches(
              basedScript,
              { "data-base-path": "my-app", "data-pr-preview-prefix": "pr-preview" },
              "/my-app/docs/guide/",
              "/my-app/",
            );

            const rootScript = loadScript("out-root/404.html");
            await assertFetches(
              rootScript,
              { "data-base-path": "", "data-pr-preview-prefix": "pr-preview" },
              "/pr-preview/pr-123/docs/guide/",
              "/pr-preview/pr-123/",
            );
            await assertFetches(
              rootScript,
              { "data-base-path": "", "data-pr-preview-prefix": "pr-preview" },
              "/docs/guide/",
              "/",
            );
          })();
          NODE
