name: Deploy Dioxus to GitHub Pages

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      ssg:
        type: boolean
        default: false
      features:
        type: string
        default: ""
      no-default-features:
        type: boolean
        default: false
      debug-symbols:
        type: boolean
        default: true
      base-path:
        description: Base path the app is deployed at. Defaults to the caller's repository name.
        type: string
        default: ""
      pr-preview-prefix:
        description: Used by the SPA-fallback 404 to recognize PR-preview subroutes. Set to empty to disable PR-preview routing in the fallback.
        type: string
        default: pr-preview
      dx-cli-version:
        type: string
        default: latest
      toolchain:
        type: string
        default: stable
      apt-packages:
        type: string
        default: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      runs-on:
        type: string
        default: ubuntu-latest
      submodules:
        type: string
        default: ""
      cache-provider:
        type: string
        default: ""

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ${{ inputs.runs-on }}
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: ${{ inputs.submodules }}
      - uses: dioxuslabs/dioxus-ci/actions/setup-dioxus@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          apt-packages: ${{ inputs.apt-packages }}
          cache-directories: target/dx
          cache-provider: ${{ inputs.cache-provider }}
      - uses: dioxuslabs/dioxus-ci/actions/install-dioxus-cli@v1
        with:
          version: ${{ inputs.dx-cli-version }}
      - id: build
        uses: dioxuslabs/dioxus-ci/actions/build-web@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          ssg: ${{ inputs.ssg }}
          features: ${{ inputs.features }}
          no-default-features: ${{ inputs.no-default-features }}
          debug-symbols: ${{ inputs.debug-symbols }}
          base-path: ${{ inputs.base-path == '' && github.event.repository.name || inputs.base-path }}
      - name: Stage output
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/.dioxus-ci-docs"
          cp -r "${{ steps.build.outputs.output-path }}" "$GITHUB_WORKSPACE/.dioxus-ci-docs"
      - uses: dioxuslabs/dioxus-ci/actions/spa-404-fallback@v1
        with:
          output-dir: ${{ github.workspace }}/.dioxus-ci-docs
          base-path: ${{ inputs.base-path == '' && github.event.repository.name || inputs.base-path }}
          pr-preview-prefix: ${{ inputs.pr-preview-prefix }}
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@b36f842fa378d7cbf6695fcac86ecdcef3af8af3 # v4.2.3
        with:
          token: ${{ github.token }}
          branch: gh-pages
          folder: .dioxus-ci-docs
