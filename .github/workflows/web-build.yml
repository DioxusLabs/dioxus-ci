name: Dioxus Web Build

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      ssg:
        type: boolean
        default: false
      features:
        type: string
        default: ""
      no-default-features:
        type: boolean
        default: false
      debug-symbols:
        type: boolean
        default: true
      base-path:
        description: Base path the app is deployed at. PR previews are built under `<base-path>/pr-preview/pr-<N>`.
        type: string
        default: ""
      artifact-retention-days:
        type: number
        default: 7
      dx-cli-version:
        type: string
        default: latest
      toolchain:
        type: string
        default: stable
      runs-on:
        type: string
        default: ubuntu-latest
      submodules:
        type: string
        default: ""
      cache-provider:
        type: string
        default: ""

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Web Build
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: ${{ inputs.submodules }}
      - uses: ealmloff/dioxus-ci/actions/setup-dioxus@main
        with:
          toolchain: ${{ inputs.toolchain }}
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache-directories: target/dx
          cache-provider: ${{ inputs.cache-provider }}
      - uses: ealmloff/dioxus-ci/actions/install-dioxus-cli@main
        with:
          version: ${{ inputs.dx-cli-version }}
      - id: paths
        name: Resolve pages paths
        shell: bash
        env:
          BASE_PATH: ${{ inputs.base-path }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os

          base_path = os.environ["BASE_PATH"].strip().strip("/")
          event_name = os.environ["EVENT_NAME"]
          pr_number = os.environ["PR_NUMBER"]

          target_folder = ""
          build_base_path = base_path
          if event_name == "pull_request":
              if not pr_number:
                  raise SystemExit("pull_request event is missing a PR number")
              target_folder = f"pr-preview/pr-{int(pr_number)}"
              build_base_path = "/".join(part for part in (base_path, target_folder) if part)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"site-base-path={base_path}\n")
              output.write(f"build-base-path={build_base_path}\n")
              output.write(f"target-folder={target_folder}\n")
          PY
      - id: build
        uses: ealmloff/dioxus-ci/actions/build-web@main
        with:
          working-directory: ${{ inputs.working-directory }}
          ssg: ${{ inputs.ssg }}
          features: ${{ inputs.features }}
          no-default-features: ${{ inputs.no-default-features }}
          debug-symbols: ${{ inputs.debug-symbols }}
          base-path: ${{ steps.paths.outputs.build-base-path }}
      - name: Stage pages artifact
        shell: bash
        env:
          OUTPUT_PATH: ${{ steps.build.outputs.output-path }}
          ARTIFACT_DIR: ${{ runner.temp }}/dioxus-pages
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          WORKFLOW_SHA: ${{ github.sha }}
          MERGE_SHA: ${{ github.sha }}
          SITE_BASE_PATH: ${{ steps.paths.outputs.site-base-path }}
          BUILD_BASE_PATH: ${{ steps.paths.outputs.build-base-path }}
          TARGET_FOLDER: ${{ steps.paths.outputs.target-folder }}
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR/site"
          cp -a "$OUTPUT_PATH/." "$ARTIFACT_DIR/site/"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ["ARTIFACT_DIR"])
          event_name = os.environ["EVENT_NAME"]
          pr_number = os.environ["PR_NUMBER"]
          pr_number_value = int(pr_number) if pr_number else None
          head_sha = os.environ["HEAD_SHA"] or os.environ["WORKFLOW_SHA"]
          merge_sha = os.environ["MERGE_SHA"] if event_name == "pull_request" else ""
          metadata = {
              "schema_version": 1,
              "kind": "dioxus-pages",
              "repository": os.environ["REPOSITORY"],
              "event_name": event_name,
              "ref": os.environ["REF"],
              "ref_name": os.environ["REF_NAME"],
              "pr_number": pr_number_value,
              "head_sha": head_sha,
              "merge_sha": merge_sha,
              "site_base_path": os.environ["SITE_BASE_PATH"],
              "base_path": os.environ["BUILD_BASE_PATH"],
              "target_folder": os.environ["TARGET_FOLDER"],
          }
          (artifact_dir / ".dioxus-ci-pages.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dioxus-pages
          path: ${{ runner.temp }}/dioxus-pages
          if-no-files-found: error
          include-hidden-files: true
          retention-days: ${{ inputs.artifact-retention-days }}
