name: Install Dioxus CLI
description: Install the `dx` CLI via cargo-binstall
inputs:
  version:
    description: Version of `dioxus-cli` to install. Use `latest` to install the most recent release.
    required: false
    default: latest
  force:
    description: Pass `--force` to `cargo binstall`
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@9d36bebae244fb1a7fd7831d3c5a4bc8f1cab230 # main
    - name: Install dioxus-cli
      shell: bash
      env:
        FORCE: ${{ inputs.force }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        args=(dioxus-cli -y)
        if [ "$FORCE" = "true" ]; then
          args+=(--force)
        fi
        if [ "$VERSION" != "latest" ] && [ -n "$VERSION" ]; then
          args+=(--version "$VERSION")
        fi
        cargo binstall "${args[@]}"
